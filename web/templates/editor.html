<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card editor</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="editor">
  <header class="editor-header">
    <h1>Card editor</h1>
    <p class="muted"><a href="/">Player</a></p>
  </header>

  <section class="panel">
    <label for="card-select">Open card</label>
    <div class="row">
      <select id="card-select">
        <option value="">— choose a card —</option>
      </select>
      <button type="button" id="scan-btn">Scan NFC</button>
    </div>
    <p id="scan-status" class="muted" hidden></p>
  </section>

  <section id="editor-panel" class="panel" hidden>
    <p class="muted card-id-label">Card id: <code id="card-id"></code></p>

    <label for="card-title">Title</label>
    <input type="text" id="card-title" placeholder="Optional display name" autocomplete="off">

    <div class="toolbar">
      <button type="button" id="save-btn">Save</button>
      <button type="button" id="play-btn">Play</button>
      <button type="button" id="stop-btn" class="secondary">Stop</button>
    </div>
    <p id="editor-status" class="muted"></p>

    <h2 class="tracks-heading">Tracks</h2>
    <p id="tracks-empty" class="muted">No tracks yet. Add audio files below.</p>
    <ol id="track-list" class="track-list"></ol>

    <label class="file-label">
      <span class="btn secondary">Add audio files</span>
      <input type="file" id="file-input" accept="audio/*" multiple hidden>
    </label>
  </section>

  <div id="import-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-card" role="dialog" aria-labelledby="import-title">
      <h2 id="import-title">Import audio</h2>
      <p id="import-queue-label" class="muted"></p>
      <p class="muted import-hint">
        Normalization evens loudness (e.g. quiet voice vs loud music). Listen below, pick one version, then save — this choice is final.
      </p>
      <p id="import-filename" class="import-filename"></p>
      <audio id="import-audio" controls class="import-audio"></audio>
      <div class="segmented" role="group" aria-label="Audio version">
        <button type="button" class="segmented-btn active" data-variant="original">Original</button>
        <button type="button" class="segmented-btn" data-variant="normalized">Normalized</button>
      </div>
      <p id="import-status" class="muted"></p>
      <div class="toolbar modal-actions">
        <button type="button" id="import-save-btn">Save to card</button>
        <button type="button" id="import-cancel-btn" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/editor.js"></script>
</body>
</html>
